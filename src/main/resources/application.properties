# APP
spring.application.name=Slink API
spring.application.version=1.0
spring.config.import=optional:secrets.properties
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}
slink.api.base_url=${API_BASE_URL:http://localhost:8080}

# CACHE
app.cache.click_sync_rate=${CLICK_SYNC_RATE:10000}
app.cache.duration=${CACHE_DURATION:60}

# LOGGING
logging.level.org.springframework.security=INFO

# DB
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/slink}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PWD:1234}